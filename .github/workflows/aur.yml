name: Update AUR PKGBUILDs for new release

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish to AUR (e.g., v0.5.0)"
        required: true
        type: string
      allow_backfill:
        description: "Allow publishing even if the new version is not newer than the current PKGBUILD version"
        required: false
        type: boolean
        default: false

jobs:
  aur-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      max-parallel: 1
      matrix:
        include:
          - pkgname: deadlock-modmanager
            pkgbuild_dir: distribution/aur/deadlock-modmanager
          - pkgname: deadlock-modmanager-bin
            pkgbuild_dir: distribution/aur/deadlock-modmanager-bin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.release_tag }}
          else
            VERSION=${{ github.event.release.tag_name }}
          fi
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version is newer
        id: check_version
        run: |
          CURRENT=$(grep '^_pkgver=' ${{ matrix.pkgbuild_dir }}/PKGBUILD | cut -d= -f2)
          NEW=${{ steps.version.outputs.version }}
          if [ "$(printf '%s\n%s' "$CURRENT" "$NEW" | sort -V | tail -n1)" = "$NEW" ] && [ "$NEW" != "$CURRENT" ]; then
            echo "is_newer=true" >> $GITHUB_OUTPUT
          else
            echo "is_newer=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare PKGBUILD
        if: steps.check_version.outputs.is_newer == 'true' || github.event.inputs.allow_backfill == 'true'
        run: |
          # Update the source PKGBUILD in-repo
          sed -i "s/^_pkgver=.*/_pkgver=${{ steps.version.outputs.version }}/" ${{ matrix.pkgbuild_dir }}/PKGBUILD
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" ${{ matrix.pkgbuild_dir }}/PKGBUILD
          # Copy for AUR deploy
          cp -r ${{ matrix.pkgbuild_dir }} ./${{ matrix.pkgname }}

      - name: Commit updated PKGBUILD
        if: steps.check_version.outputs.is_newer == 'true' || github.event.inputs.allow_backfill == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin main
          git add ${{ matrix.pkgbuild_dir }}/PKGBUILD
          git diff --staged --quiet || git commit -m "chore(aur): update ${{ matrix.pkgname }} to v${{ steps.version.outputs.version }} [skip ci]"
          git push origin main

      - name: Publish to AUR
        if: steps.check_version.outputs.is_newer == 'true' || github.event.inputs.allow_backfill == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@2ac5a4c1d7035885d46b10e3193393be8460b6f1
        with:
          pkgname: ${{ matrix.pkgname }}
          pkgbuild: ${{ matrix.pkgname }}/PKGBUILD
          commit_username: GitHub Actions
          commit_email: github-actions@github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.event.release.tag_name }}
          updpkgsums: true
