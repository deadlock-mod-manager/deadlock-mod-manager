name: Update AUR PKGBUILD for new release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish to AUR (e.g., v0.5.0)"
        required: true
        type: string

jobs:
  aur-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.release_tag }}
            VERSION=${VERSION#v}
          else
            VERSION=${GITHUB_REF##*/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare PKGBUILD
        run: |
          # Update the source PKGBUILD in-repo
          sed -i "s/^_pkgver=.*/_pkgver=${{ steps.version.outputs.version }}/" packages/aur/deadlock-modmanager/PKGBUILD
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" packages/aur/deadlock-modmanager/PKGBUILD
          # Copy for AUR deploy
          cp -r packages/aur/deadlock-modmanager ./deadlock-modmanager

      - name: Commit updated PKGBUILD
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add packages/aur/deadlock-modmanager/PKGBUILD
          git diff --staged --quiet || git commit -m "chore(aur): update deadlock-modmanager to v${{ steps.version.outputs.version }} [skip ci]"
          git push origin main

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@2ac5a4c1d7035885d46b10e3193393be8460b6f1
        with:
          pkgname: deadlock-modmanager
          pkgbuild: deadlock-modmanager/PKGBUILD
          commit_username: GitHub Actions
          commit_email: github-actions@github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          updpkgsums: true
