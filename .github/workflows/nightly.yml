name: Nightly Build

env:
  NODE_VERSION: "24.8.0"

concurrency:
  group: nightly-build
  cancel-in-progress: true

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual triggering
    inputs:
      force_build:
        description: "Build even if no new desktop commits"
        type: boolean
        default: false
      build_windows:
        description: "Build for Windows"
        type: boolean
        default: true
      build_linux:
        description: "Build for Linux"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  check-commits:
    if: github.repository_owner == 'deadlock-mod-manager'
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      commit_count: ${{ steps.check.outputs.commit_count }}
      latest_commit: ${{ steps.check.outputs.latest_commit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits since last nightly
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_build }}" = "true" ]; then
            echo "Force build requested"
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "commit_count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
            echo "latest_commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST_NIGHTLY_COMMIT=""

          # The rolling "nightly" tag points at the commit used in the previous build
          if git rev-parse "nightly" >/dev/null 2>&1; then
            LAST_NIGHTLY_COMMIT=$(git rev-list -n 1 nightly)
            echo "Last nightly commit: $LAST_NIGHTLY_COMMIT"
          fi

          PATHS="apps/desktop packages"

          if [ -z "$LAST_NIGHTLY_COMMIT" ]; then
            echo "No previous nightly build found, will build"
            COMMIT_COUNT=$(git rev-list --count HEAD)
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            CHANGED_FILES=$(git diff --name-only ${LAST_NIGHTLY_COMMIT}..HEAD -- $PATHS)

            if [ -n "$CHANGED_FILES" ]; then
              COMMIT_COUNT=$(git rev-list --count ${LAST_NIGHTLY_COMMIT}..HEAD -- $PATHS)
              echo "Found $COMMIT_COUNT new desktop commits since last nightly"
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              COMMIT_COUNT=0
              echo "No new desktop commits since last nightly"
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          fi

          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "latest_commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  prepare-matrix:
    if: github.repository_owner == 'deadlock-mod-manager'
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      builds_linux: ${{ steps.set-matrix.outputs.builds_linux }}
      builds_windows: ${{ steps.set-matrix.outputs.builds_windows }}
    steps:
      - name: Prepare build matrix
        id: set-matrix
        run: |
          LINUX='{"platform":"depot-ubuntu-24.04","os":"linux"}'
          WINDOWS='{"platform":"depot-windows-2025","os":"windows"}'
          include="[]"
          builds_linux="false"
          builds_windows="false"

          build_windows="true"
          build_linux="true"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            build_windows="${{ inputs.build_windows }}"
            build_linux="${{ inputs.build_linux }}"
          fi

          if [ "$build_windows" = "true" ]; then
            include=$(echo "$include" | jq -c ". + [$WINDOWS]")
            builds_windows="true"
          fi

          if [ "$build_linux" = "true" ]; then
            include=$(echo "$include" | jq -c ". + [$LINUX]")
            builds_linux="true"
          fi

          if [ "$include" = "[]" ]; then
            include=$(echo "[]" | jq -c ". + [$WINDOWS, $LINUX]")
            builds_linux="true"
            builds_windows="true"
          fi

          matrix=$(echo "$include" | jq -c '{include: .}')

          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "builds_linux=$builds_linux" >> $GITHUB_OUTPUT
          echo "builds_windows=$builds_windows" >> $GITHUB_OUTPUT
          echo "Selected platforms: $matrix"

  create-nightly-release:
    needs: check-commits
    if: needs.check-commits.outputs.should_build == 'true'
    permissions:
      contents: write
    runs-on: depot-ubuntu-24.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      nightly_version: ${{ steps.version.outputs.nightly_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Compute nightly version label
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          DATE=$(date +%Y%m%d)
          COMMIT_SHORT=${{ needs.check-commits.outputs.latest_commit }}
          # This mirrors what update-nightly-version.ts will produce
          MAJOR=$(echo "$PACKAGE_VERSION" | cut -d. -f1)
          MINOR=$(echo "$PACKAGE_VERSION" | cut -d. -f2)
          BUMPED_MINOR=$((MINOR + 1))
          NIGHTLY_VERSION="${MAJOR}.${BUMPED_MINOR}.0-nightly.${DATE}.${COMMIT_SHORT}"
          echo "nightly_version=$NIGHTLY_VERSION" >> $GITHUB_OUTPUT
          echo "Nightly version: $NIGHTLY_VERSION"

      - name: Generate commit list
        id: commits
        run: |
          if git rev-parse "nightly" >/dev/null 2>&1; then
            LAST_NIGHTLY_COMMIT=$(git rev-list -n 1 nightly)
            COMMIT_RANGE="${LAST_NIGHTLY_COMMIT}..HEAD"
          else
            COMMIT_RANGE="HEAD"
          fi

          COMMIT_LIST=$(git log $COMMIT_RANGE --pretty=format:"- %s (%h)" --no-merges)

          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete previous nightly release and tag
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'nightly'
              });
              console.log(`Deleting previous nightly release: ${release.id}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              console.log('No previous nightly release found');
            }

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/nightly'
              });
              console.log('Deleted previous nightly tag');
            } catch (error) {
              if (error.status !== 422) throw error;
              console.log('No previous nightly tag found');
            }

            // Sweep any stale draft Nightly releases left behind by previously cancelled/killed runs
            let page = 1;
            while (true) {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page
              });
              if (releases.length === 0) break;
              for (const r of releases) {
                if (r.draft && r.name?.startsWith('Nightly ')) {
                  console.log(`Deleting stale draft nightly: ${r.name} (${r.id})`);
                  await github.rest.repos.deleteRelease({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    release_id: r.id
                  });
                }
              }
              if (releases.length < 100) break;
              page++;
            }

      - name: Create nightly release
        id: create-release
        uses: actions/github-script@v7
        env:
          COMMITS: ${{ steps.commits.outputs.commits }}
          NIGHTLY_VERSION: ${{ steps.version.outputs.nightly_version }}
        with:
          script: |
            const nightlyVersion = process.env.NIGHTLY_VERSION;
            const commitCount = ${{ needs.check-commits.outputs.commit_count }};
            const commits = process.env.COMMITS;

            console.log(`Creating nightly release for ${nightlyVersion}`);

            const releaseBody = [
              "**Nightly build from latest development**",
              "",
              `Version: ${nightlyVersion}`,
              `Built: ${new Date().toISOString().split('T')[0]}`,
              `Commits since last nightly: ${commitCount}`,
              `Latest Commit: ${context.sha.substring(0, 7)}`,
              "",
              "**Warning:** This is a nightly build and may contain unstable features or bugs.",
              "",
              "## Changes in this nightly build",
              "",
              commits || "No commits found",
              "",
              "---",
              "*This release was generated automatically from the latest development branch.*"
            ].join('\n');

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'nightly',
              target_commitish: context.sha,
              name: `Nightly ${nightlyVersion}`,
              body: releaseBody,
              draft: true,
              prerelease: true
            });

            console.log(`Release created with ID: ${data.id}`);
            console.log(`Release URL: ${data.html_url}`);

            const { data: verifyRelease } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: data.id
            });

            if (!verifyRelease || verifyRelease.id !== data.id) {
              throw new Error(`Failed to verify release creation. Expected ID ${data.id}, got ${verifyRelease?.id}`);
            }

            console.log(`Release verified: ${verifyRelease.name} (ID: ${verifyRelease.id}, draft: ${verifyRelease.draft})`);

            return data.id;

  build-cef:
    needs: [check-commits, create-nightly-release]
    if: needs.check-commits.outputs.should_build == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/_build-cef.yml
    with:
      release_id: ${{ needs.create-nightly-release.outputs.release_id }}
      version: nightly
      nightly: true
      signpath_policy: test-signing
      sign_windows: false
      runner_linux: depot-ubuntu-24.04-8
      runner_windows: depot-windows-2025
    secrets:
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}

  build-nightly:
    needs: [check-commits, prepare-matrix, create-nightly-release]
    if: needs.check-commits.outputs.should_build == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache for cargo
        shell: bash
        run: |
          SCCACHE_WRAPPER="${SCCACHE_PATH//\\//}"
          echo "RUSTC_WRAPPER=${SCCACHE_WRAPPER}" >> "$GITHUB_ENV"
          mkdir -p "$CARGO_HOME"
          printf '[build]\nrustc-wrapper = "%s"\n' "$SCCACHE_WRAPPER" >> "$CARGO_HOME/config.toml"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> apps/desktop/target
          key: nightly-${{ matrix.os }}
          cache-on-failure: true

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install apt dependencies (ubuntu only)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2 \
            libappindicator3-dev \
            librsvg2-dev \
            flatpak \
            flatpak-builder

      - name: Install Flatpak SDK (ubuntu only)
        if: matrix.os == 'linux'
        uses: ./.github/actions/install-flatpak-sdk
        with:
          runtime-version: "49"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Update version with commit hash
        run: pnpm version:nightly ${{ needs.check-commits.outputs.latest_commit }}

      # Linux build - upload directly to release
      - name: Build the app (Linux)
        if: matrix.os == 'linux'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          VITE_API_URL: https://api.deadlockmods.app
          VITE_WEB_URL: https://deadlockmods.app
          VITE_AUTH_URL: https://auth.deadlockmods.app
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        with:
          projectPath: ./apps/desktop
          releaseId: ${{ needs.create-nightly-release.outputs.release_id }}
          tauriScript: pnpm tauri

      - name: Build Flatpak bundle (Linux)
        if: matrix.os == 'linux'
        uses: ./.github/actions/build-flatpak-bundle
        with:
          bundle-filename: deadlock-mod-manager.flatpak

      - name: Upload Flatpak to release (Linux)
        if: matrix.os == 'linux'
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-nightly-release.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const releaseId = parseInt(process.env.RELEASE_ID);
            const content = fs.readFileSync('deadlock-mod-manager.flatpak');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'deadlock-mod-manager.flatpak',
              data: content
            });
            console.log('Successfully uploaded Flatpak bundle');

      # Windows build - upload unsigned artifact for separate SignPath workflow
      - name: Build the app (Windows)
        if: matrix.os == 'windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          VITE_API_URL: https://api.deadlockmods.app
          VITE_WEB_URL: https://deadlockmods.app
          VITE_AUTH_URL: https://auth.deadlockmods.app
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        with:
          projectPath: ./apps/desktop
          args: "--bundles nsis,updater"

      - name: Upload unsigned Windows artifact
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned-nightly
          path: apps/desktop/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  trigger-windows-signing:
    needs:
      [
        check-commits,
        prepare-matrix,
        create-nightly-release,
        build-nightly,
        build-cef,
      ]
    if: >-
      always() &&
      needs.check-commits.outputs.should_build == 'true' &&
      needs.build-nightly.result == 'success' &&
      needs.prepare-matrix.outputs.builds_windows == 'true'
    runs-on: depot-ubuntu-24.04
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger Windows signing workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'sign-nightly-windows.yml',
              ref: context.ref,
              inputs: {
                release_id: '${{ needs.create-nightly-release.outputs.release_id }}',
                source_run_id: String(context.runId),
                nightly_version: '${{ needs.create-nightly-release.outputs.nightly_version }}',
                builds_linux: '${{ needs.prepare-matrix.outputs.builds_linux }}',
              }
            });

            console.log('Dispatched sign-nightly-windows workflow');
  cleanup-nightly:
    permissions:
      contents: write
    runs-on: depot-ubuntu-24.04
    needs:
      [check-commits, prepare-matrix, create-nightly-release, build-nightly]
    if: (failure() || cancelled()) && needs.check-commits.outputs.should_build == 'true'

    steps:
      - name: Delete failed nightly release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-nightly-release.outputs.release_id }}
        with:
          script: |
            if (process.env.release_id) {
              console.log(`Cleaning up failed nightly release: ${process.env.release_id}`);
              try {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: process.env.release_id
                });
                console.log('Successfully cleaned up failed release');
              } catch (error) {
                console.error(`Cleanup failed: ${error.message}`);
              }
            }
