name: Nightly Build

env:
  NODE_VERSION: "24.8.0"

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual triggering
    inputs:
      build_windows:
        description: "Build for Windows"
        type: boolean
        default: true
      build_linux:
        description: "Build for Linux"
        type: boolean
        default: true

jobs:
  check-commits:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      commit_count: ${{ steps.check.outputs.commit_count }}
      latest_commit: ${{ steps.check.outputs.latest_commit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits since last nightly
        id: check
        run: |
          LAST_NIGHTLY_COMMIT=""

          # The rolling "nightly" tag points at the commit used in the previous build
          if git rev-parse "nightly" >/dev/null 2>&1; then
            LAST_NIGHTLY_COMMIT=$(git rev-list -n 1 nightly)
            echo "Last nightly commit: $LAST_NIGHTLY_COMMIT"
          fi

          PATHS="apps/desktop packages"

          if [ -z "$LAST_NIGHTLY_COMMIT" ]; then
            echo "No previous nightly build found, will build"
            COMMIT_COUNT=$(git rev-list --count HEAD)
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            CHANGED_FILES=$(git diff --name-only ${LAST_NIGHTLY_COMMIT}..HEAD -- $PATHS)

            if [ -n "$CHANGED_FILES" ]; then
              COMMIT_COUNT=$(git rev-list --count ${LAST_NIGHTLY_COMMIT}..HEAD -- $PATHS)
              echo "Found $COMMIT_COUNT new desktop commits since last nightly"
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              COMMIT_COUNT=0
              echo "No new desktop commits since last nightly"
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          fi

          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "latest_commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  prepare-matrix:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Prepare build matrix
        id: set-matrix
        run: |
          # For scheduled runs, build all platforms
          if [ "${{ github.event_name }}" = "schedule" ]; then
            matrix='{"platform":["windows-latest","ubuntu-24.04"]}'
          else
            # For manual dispatch, build based on inputs
            platforms=""
            
            if [ "${{ inputs.build_windows }}" = "true" ]; then
              platforms="windows-latest"
            fi
            
            if [ "${{ inputs.build_linux }}" = "true" ]; then
              if [ -z "$platforms" ]; then
                platforms="ubuntu-24.04"
              else
                platforms="$platforms,ubuntu-24.04"
              fi
            fi
            
            # If no platforms selected, default to all
            if [ -z "$platforms" ]; then
              platforms="windows-latest,ubuntu-24.04"
            fi
            
            # Convert to JSON array
            matrix=$(echo "$platforms" | jq -Rc 'split(",") | {platform: .}')
          fi

          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Selected platforms: $matrix"

  create-nightly-release:
    needs: check-commits
    if: needs.check-commits.outputs.should_build == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      nightly_version: ${{ steps.version.outputs.nightly_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: pnpm-lock.yaml

      - uses: pnpm/action-setup@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Compute nightly version label
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          DATE=$(date +%Y%m%d)
          COMMIT_SHORT=${{ needs.check-commits.outputs.latest_commit }}
          # This mirrors what update-nightly-version.ts will produce
          MAJOR=$(echo "$PACKAGE_VERSION" | cut -d. -f1)
          MINOR=$(echo "$PACKAGE_VERSION" | cut -d. -f2)
          BUMPED_MINOR=$((MINOR + 1))
          NIGHTLY_VERSION="${MAJOR}.${BUMPED_MINOR}.0-nightly.${DATE}.${COMMIT_SHORT}"
          echo "nightly_version=$NIGHTLY_VERSION" >> $GITHUB_OUTPUT
          echo "Nightly version: $NIGHTLY_VERSION"

      - name: Generate commit list
        id: commits
        run: |
          if git rev-parse "nightly" >/dev/null 2>&1; then
            LAST_NIGHTLY_COMMIT=$(git rev-list -n 1 nightly)
            COMMIT_RANGE="${LAST_NIGHTLY_COMMIT}..HEAD"
          else
            COMMIT_RANGE="HEAD"
          fi

          COMMIT_LIST=$(git log $COMMIT_RANGE --pretty=format:"- %s (%h)" --no-merges)

          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete previous nightly release and tag
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'nightly'
              });
              console.log(`Deleting previous nightly release: ${release.id}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              console.log('No previous nightly release found');
            }

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/nightly'
              });
              console.log('Deleted previous nightly tag');
            } catch (error) {
              if (error.status !== 422) throw error;
              console.log('No previous nightly tag found');
            }

      - name: Create nightly release
        id: create-release
        uses: actions/github-script@v7
        env:
          COMMITS: ${{ steps.commits.outputs.commits }}
          NIGHTLY_VERSION: ${{ steps.version.outputs.nightly_version }}
        with:
          script: |
            const nightlyVersion = process.env.NIGHTLY_VERSION;
            const commitCount = ${{ needs.check-commits.outputs.commit_count }};
            const commits = process.env.COMMITS;

            console.log(`Creating nightly release for ${nightlyVersion}`);

            const releaseBody = [
              "**Nightly build from latest development**",
              "",
              `Version: ${nightlyVersion}`,
              `Built: ${new Date().toISOString().split('T')[0]}`,
              `Commits since last nightly: ${commitCount}`,
              `Latest Commit: ${context.sha.substring(0, 7)}`,
              "",
              "**Warning:** This is a nightly build and may contain unstable features or bugs.",
              "",
              "## Changes in this nightly build",
              "",
              commits || "No commits found",
              "",
              "---",
              "*This release was generated automatically from the latest development branch.*"
            ].join('\n');

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'nightly',
              target_commitish: context.sha,
              name: `Nightly ${nightlyVersion}`,
              body: releaseBody,
              draft: true,
              prerelease: true
            });

            console.log(`Release created with ID: ${data.id}`);
            console.log(`Release URL: ${data.html_url}`);

            const { data: verifyRelease } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: data.id
            });

            if (!verifyRelease || verifyRelease.id !== data.id) {
              throw new Error(`Failed to verify release creation. Expected ID ${data.id}, got ${verifyRelease?.id}`);
            }

            console.log(`Release verified: ${verifyRelease.name} (ID: ${verifyRelease.id}, draft: ${verifyRelease.draft})`);

            return data.id;

  build-nightly:
    needs: [check-commits, prepare-matrix, create-nightly-release]
    if: needs.check-commits.outputs.should_build == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> apps/desktop/target

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: pnpm-lock.yaml

      - uses: pnpm/action-setup@v4

      - name: Install apt dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2 \
            libappindicator3-dev \
            librsvg2-dev \
            flatpak \
            flatpak-builder

      - name: Install Flatpak SDK (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        uses: ./.github/actions/install-flatpak-sdk
        with:
          runtime-version: "49"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Update version with commit hash
        run: pnpm version:nightly ${{ needs.check-commits.outputs.latest_commit }}

      # Linux build - upload directly to release
      - name: Build the app (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          VITE_API_URL: https://api.deadlockmods.app
          VITE_WEB_URL: https://deadlockmods.app
          VITE_AUTH_URL: https://auth.deadlockmods.app
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        with:
          projectPath: ./apps/desktop
          releaseId: ${{ needs.create-nightly-release.outputs.release_id }}
          tauriScript: pnpm tauri

      - name: Build Flatpak bundle (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          DEB_PATH=$(find apps/desktop/target/release/bundle/deb -name '*.deb' | head -1)
          cp "$DEB_PATH" apps/desktop/flatpak/deadlock-mod-manager.deb
          cp apps/desktop/src-tauri/dev.stormix.deadlock-mod-manager.metainfo.xml apps/desktop/flatpak/

          flatpak-builder --user --force-clean --repo=flatpak-repo flatpak-build apps/desktop/flatpak/dev.stormix.deadlock-mod-manager.yml
          flatpak build-bundle flatpak-repo deadlock-mod-manager.flatpak dev.stormix.deadlock-mod-manager

      - name: Upload Flatpak to release (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-nightly-release.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const releaseId = parseInt(process.env.RELEASE_ID);
            const content = fs.readFileSync('deadlock-mod-manager.flatpak');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'deadlock-mod-manager.flatpak',
              data: content
            });
            console.log('Successfully uploaded Flatpak bundle');

      # Windows build - don't upload to release yet, need to code-sign first
      - name: Build the app (Windows)
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          VITE_API_URL: https://api.deadlockmods.app
          VITE_WEB_URL: https://deadlockmods.app
          VITE_AUTH_URL: https://auth.deadlockmods.app
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        with:
          projectPath: ./apps/desktop
          args: "--bundles nsis,updater"

      # Windows: SignPath code signing flow
      - name: Sign Windows executables
        if: matrix.platform == 'windows-latest'
        id: signpath-sign
        uses: ./.github/actions/signpath-sign
        with:
          unsigned-artifact-path: apps/desktop/target/release/bundle/nsis/*.exe
          output-directory: ./artifact-output
          signpath-api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          signpath-organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          signpath-project-slug: deadlock-mod-manager
          signpath-signing-policy: test-signing
          tauri-private-key: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Upload signed Windows artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-nightly-signed
          path: ./artifact-output/*
          if-no-files-found: error

      - name: Upload signed artifacts to release
        if: matrix.platform == 'windows-latest'
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-nightly-release.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const releaseId = parseInt(process.env.RELEASE_ID);
            console.log(`Release ID from env: ${process.env.RELEASE_ID}`);
            console.log(`Parsed release ID: ${releaseId}`);

            try {
              const { data: release } = await github.rest.repos.getRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId
              });
              console.log(`Found release: ${release.name} (draft: ${release.draft})`);
            } catch (error) {
              console.error(`Failed to find release ${releaseId}: ${error.message}`);
              throw error;
            }

            const artifactDir = './artifact-output';
            const files = fs.readdirSync(artifactDir);
            console.log(`Files in artifact directory: ${JSON.stringify(files)}`);

            for (const file of files) {
              const filePath = path.join(artifactDir, file);
              const stats = fs.statSync(filePath);
              
              if (stats.isFile()) {
                const sanitizedName = file.trim();
                console.log(`Uploading "${sanitizedName}" (original: "${file}") to release...`);
                console.log(`File size: ${stats.size} bytes`);
                const content = fs.readFileSync(filePath);
                
                try {
                  await github.rest.repos.uploadReleaseAsset({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    release_id: releaseId,
                    name: sanitizedName,
                    data: content
                  });
                  console.log(`Successfully uploaded ${sanitizedName}`);
                } catch (uploadError) {
                  console.error(`Upload failed for ${sanitizedName}`);
                  console.error(`Owner: ${context.repo.owner}, Repo: ${context.repo.repo}`);
                  console.error(`Release ID: ${releaseId}`);
                  console.error(`Error: ${uploadError.message}`);
                  if (uploadError.response) {
                    console.error(`Status: ${uploadError.response.status}`);
                    console.error(`Response data: ${JSON.stringify(uploadError.response.data)}`);
                  }
                  throw uploadError;
                }
              }
            }

      - name: Upload latest.json to release (Windows-only nightly)
        if: matrix.platform == 'windows-latest' && !contains(fromJSON(needs.prepare-matrix.outputs.matrix).platform, 'ubuntu-24.04')
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-nightly-release.outputs.release_id }}
          NIGHTLY_VERSION: ${{ needs.create-nightly-release.outputs.nightly_version }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function toGitHubAssetName(name) {
              return name
                .trim()
                .replace(/[^a-zA-Z0-9_-]/g, '.')
                .replace(/\.+/g, '.');
            }

            const releaseId = parseInt(process.env.RELEASE_ID);
            const nightlyVersion = process.env.NIGHTLY_VERSION;
            const artifactDir = './artifact-output';
            const files = fs.readdirSync(artifactDir);
            const sigFile = files.find(f => f.endsWith('.exe.sig'));
            const exeFile = files.find(f => f.endsWith('.exe') && !f.endsWith('.exe.sig'));

            if (!sigFile) {
              throw new Error('No .exe.sig file found in artifact-output');
            }
            if (!exeFile) {
              throw new Error('No .exe file found in artifact-output');
            }

            const signature = fs.readFileSync(path.join(artifactDir, sigFile), 'utf8').trim();
            const baseDownloadUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/nightly`;
            const githubAssetName = toGitHubAssetName(exeFile);
            const exeUrl = `${baseDownloadUrl}/${githubAssetName}`;

            const latestJson = {
              version: nightlyVersion,
              notes: 'Nightly build',
              pub_date: new Date().toISOString(),
              platforms: {
                'windows-x86_64': {
                  signature: signature,
                  url: exeUrl
                },
                'windows-x86_64-nsis': {
                  signature: signature,
                  url: exeUrl
                }
              }
            };

            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId
            });

            const existingLatest = release.assets.find(a => a.name === 'latest.json');
            if (existingLatest) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existingLatest.id
              });
              console.log('Deleted existing latest.json before upload');
            }

            const newContent = JSON.stringify(latestJson, null, 2);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'latest.json',
              data: Buffer.from(newContent)
            });

            console.log('Successfully uploaded latest.json (Windows-only nightly)');

  update-latest-json:
    needs: [check-commits, create-nightly-release, build-nightly]
    if: needs.check-commits.outputs.should_build == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows signed artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-nightly-signed
          path: release-artifacts/windows

      - name: Update latest.json
        uses: ./.github/actions/update-latest-json
        with:
          release-id: ${{ needs.create-nightly-release.outputs.release_id }}
          signed-artifact-path: ./release-artifacts/windows
          version: nightly
          github-token: ${{ secrets.GITHUB_TOKEN }}

  publish-nightly:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    needs:
      [
        check-commits,
        prepare-matrix,
        create-nightly-release,
        build-nightly,
        update-latest-json,
      ]
    if: needs.check-commits.outputs.should_build == 'true'

    steps:
      - name: Publish nightly release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-nightly-release.outputs.release_id }}
        with:
          script: |
            try {
              console.log(`Publishing nightly release ID: ${process.env.release_id}`);
              
              const { data: updatedRelease } = await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: process.env.release_id,
                draft: false,
                prerelease: true
              });
              
              console.log(`Successfully published nightly release: ${updatedRelease.html_url}`);
              return updatedRelease.id;
            } catch (error) {
              console.error(`Failed to publish nightly release: ${error.message}`);
              throw error;
            }

  cleanup-nightly:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    needs:
      [check-commits, prepare-matrix, create-nightly-release, build-nightly]
    if: failure() && needs.check-commits.outputs.should_build == 'true'

    steps:
      - name: Delete failed nightly release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-nightly-release.outputs.release_id }}
        with:
          script: |
            if (process.env.release_id) {
              console.log(`Cleaning up failed nightly release: ${process.env.release_id}`);
              try {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: process.env.release_id
                });
                console.log('Successfully cleaned up failed release');
              } catch (error) {
                console.error(`Cleanup failed: ${error.message}`);
              }
            }
