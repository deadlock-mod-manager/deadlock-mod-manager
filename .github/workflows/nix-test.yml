name: Test Nix Build

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "package.nix"
      - "apps/desktop/**"
      - "apps/dmodpkg/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/nix-test.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-hashes:
    name: Update Nix Hashes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      hashes_updated: ${{ steps.update.outputs.updated }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Compute and update hashes
        id: update
        run: |
          set -euo pipefail
          UPDATED="false"

          # --- Update pnpm deps hash in package.nix ---
          echo "::group::Computing pnpm deps hash"
          CURRENT_PNPM_HASH=$(grep -oP 'hash = "\Ksha256-[^"]+' package.nix | head -1 || echo "")
          echo "Current pnpm hash: $CURRENT_PNPM_HASH"

          if [ -n "$CURRENT_PNPM_HASH" ]; then
            # Invalidate the hash to force nix to report the correct one
            sed -i '0,/hash = "sha256-[^"]*"/s|hash = "sha256-[^"]*"|hash = "sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="|' package.nix

            BUILD_OUTPUT=$(nix build .#default --no-link 2>&1 || true)
            NEW_PNPM_HASH=$(echo "$BUILD_OUTPUT" | grep -oP 'got:\s+\Ksha256-[a-zA-Z0-9+/=]+' | head -1 || echo "")

            if [ -n "$NEW_PNPM_HASH" ]; then
              echo "Computed pnpm hash: $NEW_PNPM_HASH"
              sed -i "0,/hash = \"sha256-[^\"]*\"/s|hash = \"sha256-[^\"]*\"|hash = \"$NEW_PNPM_HASH\"|" package.nix

              if [ "$NEW_PNPM_HASH" != "$CURRENT_PNPM_HASH" ]; then
                echo "Updated pnpm deps hash"
                UPDATED="true"
              fi
            else
              echo "Could not determine new pnpm hash, restoring original"
              sed -i "0,/hash = \"sha256-[^\"]*\"/s|hash = \"sha256-[^\"]*\"|hash = \"$CURRENT_PNPM_HASH\"|" package.nix
            fi
          fi
          echo "::endgroup::"

          # --- Update cargoHash for all Rust packages ---
          # Each entry: "package_name:nix_attr:package_nix_path"
          RUST_PACKAGES=(
            "desktop:default:package.nix"
            "vpk-parser:vpk-parser:packages/vpk-parser/package.nix"
            "kv-parser:kv-parser:packages/kv-parser/package.nix"
            "dmodpkg:dmodpkg:packages/dmodpkg/package.nix"
          )

          for pkg_entry in "${RUST_PACKAGES[@]}"; do
            IFS=':' read -r PKG_NAME NIX_ATTR PKG_NIX_PATH <<< "$pkg_entry"

            echo "::group::Computing cargoHash for $PKG_NAME ($PKG_NIX_PATH)"

            if [ ! -f "$PKG_NIX_PATH" ]; then
              echo "Skipping $PKG_NAME: $PKG_NIX_PATH not found"
              echo "::endgroup::"
              continue
            fi

            CURRENT_CARGO_HASH=$(grep -oP 'cargoHash = "\Ksha256-[^"]+' "$PKG_NIX_PATH" || echo "")
            echo "Current cargoHash: $CURRENT_CARGO_HASH"

            # Set cargoHash to a known-invalid value to force nix to report the correct one
            if [ -n "$CURRENT_CARGO_HASH" ]; then
              sed -i "s|cargoHash = \"sha256-[^\"]*\"|cargoHash = \"sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=\"|" "$PKG_NIX_PATH"

              BUILD_OUTPUT=$(nix build ".#${NIX_ATTR}" --no-link 2>&1 || true)

              # Extract the correct hash from the error output
              NEW_CARGO_HASH=$(echo "$BUILD_OUTPUT" | grep -oP 'got:\s+\Ksha256-[a-zA-Z0-9+/=]+' | head -1 || echo "")

              if [ -n "$NEW_CARGO_HASH" ]; then
                echo "Computed cargoHash: $NEW_CARGO_HASH"
                sed -i "s|cargoHash = \"sha256-[^\"]*\"|cargoHash = \"$NEW_CARGO_HASH\"|" "$PKG_NIX_PATH"

                if [ "$NEW_CARGO_HASH" != "$CURRENT_CARGO_HASH" ]; then
                  echo "Updated cargoHash for $PKG_NAME"
                  UPDATED="true"
                fi
              else
                echo "Could not determine new cargoHash for $PKG_NAME, restoring original"
                sed -i "s|cargoHash = \"sha256-[^\"]*\"|cargoHash = \"$CURRENT_CARGO_HASH\"|" "$PKG_NIX_PATH"
              fi
            fi

            echo "::endgroup::"
          done


          echo "updated=$UPDATED" >> $GITHUB_OUTPUT

          if [ "$UPDATED" = "true" ]; then
            echo "::notice::Hashes were updated"
            grep "hash =" package.nix | head -1
          fi

      - name: Commit and push updated hashes
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.nix packages/*/package.nix apps/*/package.nix
          git diff --staged --quiet && exit 0

          git commit -m "chore(nix): update dependency hashes [skip ci]"
          git push

  check-flake:
    name: Check Flake
    runs-on: ubuntu-latest
    needs: [update-hashes]
    if: always() && !failure() && !cancelled()
    steps:
      - name: Checkout repository (latest after hash updates)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: git pull --ff-only origin "${GITHUB_REF#refs/heads/}" || true

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Check flake
        run: nix flake check --all-systems --show-trace

      - name: Show flake metadata
        run: nix flake metadata

  build-nightly:
    name: Build Nightly Package
    runs-on: ubuntu-latest
    needs: check-flake
    if: always() && needs.check-flake.result == 'success'
    steps:
      - name: Free disk space
        run: |
          echo "::group::Disk space before cleanup"
          df -h
          echo "::endgroup::"

          echo "::group::Removing unnecessary software"
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "::endgroup::"

          echo "::group::Disk space after cleanup"
          df -h
          echo "::endgroup::"

      - name: Checkout repository (latest after hash updates)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: git pull --ff-only origin "${GITHUB_REF#refs/heads/}" || true

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Build nightly package
        run: |
          nix build .#nightly --print-build-logs

      - name: Check binary
        run: |
          nix run .#nightly -- --version || true
          nix path-info .#nightly

      - name: Show package info
        run: |
          nix eval .#nightly.meta.description --json
          nix eval .#nightly.version --json || echo "Version info not available"

  build-dev-shell:
    name: Test Development Shell
    runs-on: ubuntu-latest
    needs: check-flake
    if: always() && needs.check-flake.result == 'success'
    steps:
      - name: Checkout repository (latest after hash updates)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: git pull --ff-only origin "${GITHUB_REF#refs/heads/}" || true

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Build development shell
        run: |
          nix develop --command echo "Development shell loaded successfully"

      - name: Check dev tools availability
        run: |
          nix develop --command bash -c "
            echo 'Checking Rust toolchain...'
            rustc --version
            cargo --version

            echo 'Checking Node.js tools...'
            node --version
            pnpm --version
            bun --version

            echo 'Checking development tools...'
            biome --version || echo 'biome not in PATH'
            turbo --version
          "
