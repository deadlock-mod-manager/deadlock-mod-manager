name: Test Nix Build

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "package.nix"
      - "apps/desktop/**"
      - "apps/dmodpkg/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/nix-test.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-flake:
    name: Check Flake
    runs-on: ubuntu-latest
    if: always() && !failure() && !cancelled()
    steps:
      - name: Checkout repository (latest after hash updates)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: git pull --ff-only origin "${GITHUB_REF#refs/heads/}" || true

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      
      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Check flake
        run: nix flake check --all-systems --show-trace

      - name: Show flake metadata
        run: nix flake metadata

  update-hashes:
    name: Update Nix Hashes
    runs-on: ubuntu-latest
    needs: check-flake
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      hashes_updated: ${{ steps.update.outputs.updated }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      
      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Install nix-update
        run: nix profile install nixpkgs#nix-update

      - name: Update hashes with nix-update
        id: update
        run: |
          set -euo pipefail
          UPDATED="false"

          # nightly and default point at the same package.nix, so
          # only "default" needs to be run to refresh it.
          ATTRS=(default vpk-parser kv-parser dmodpkg)

          for attr in "${ATTRS[@]}"; do
            echo "::group::nix-update $attr"
            if ! nix-update -F --version=skip "$attr"; then
              echo "::warning::nix-update failed for $attr"
            fi
            echo "::endgroup::"
          done

          if ! git diff --quiet; then
            UPDATED="true"
            echo "::notice::Hashes were updated"
            git diff --stat
          fi

          echo "updated=$UPDATED" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated hashes
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.nix packages/*/package.nix apps/*/package.nix
          git diff --staged --quiet && exit 0

          git commit -m "chore(nix): update dependency hashes [skip ci]"
          git push

  build-nightly:
    name: Build Nightly Package
    env:
      NIX_BUILD_CORES: "2"
    runs-on: depot-ubuntu-24.04-8
    needs: update-hashes
    if: always() && needs.update-hashes.result == 'success'
    steps:
      - name: Free disk space
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: Rampage
          witness-carnage: true

      - name: Checkout repository (latest after hash updates)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: git pull --ff-only origin "${GITHUB_REF#refs/heads/}" || true

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      
      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Build nightly package
        run: |
          nix build .#nightly --print-build-logs

      - name: Check binary
        run: |
          nix run .#nightly -- --version || true
          nix path-info .#nightly

      - name: Show package info
        run: |
          nix eval .#nightly.meta.description --json
          nix eval .#nightly.version --json || echo "Version info not available"

  build-dev-shell:
    name: Test Development Shell
    runs-on: ubuntu-latest
    needs: update-hashes
    if: always() && needs.update-hashes.result == 'success'
    steps:
      - name: Checkout repository (latest after hash updates)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: git pull --ff-only origin "${GITHUB_REF#refs/heads/}" || true

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      
      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Build development shell
        run: |
          nix develop --command echo "Development shell loaded successfully"

      - name: Check dev tools availability
        run: |
          nix develop --command bash -c "
            echo 'Checking Rust toolchain...'
            rustc --version
            cargo --version

            echo 'Checking Node.js tools...'
            node --version
            pnpm --version
            bun --version

            echo 'Checking development tools...'
            biome --version || echo 'biome not in PATH'
            turbo --version
          "
