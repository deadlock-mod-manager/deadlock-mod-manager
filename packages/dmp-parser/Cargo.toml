[package]
name = "dmp-parser"
version = "0.1.0"
edition = "2024"

[lib]
name = "dmp_parser"
path = "src-rs/lib.rs"

[[bin]]
name = "dmp-parser-cli"
path = "src-rs/cli.rs"

[dependencies]
minidump = "0.26"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
chrono = { version = "0.4", features = ["serde"] }

[profile.release]
lto = true
opt-level = "z"
codegen-units = 1
panic = "abort"
strip = true
