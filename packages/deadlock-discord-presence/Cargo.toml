[package]
name = "deadlock-discord-presence"
version = "0.1.0"
edition = "2024"
description = "Deadlock Discord rich presence state tracking and IPC helpers"
license = "GPL-3.0"
repository = "https://github.com/deadlock-mod-manager/deadlock-mod-manager"
homepage = "https://github.com/deadlock-mod-manager/deadlock-mod-manager"

[lib]
name = "deadlock_discord_presence"
crate-type = ["rlib"]
path = "src-rs/lib.rs"

[dependencies]
discord-rich-presence = "0.2"
log = "0.4"
regex = "1.12.3"
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = { version = "0.37.2", features = ["windows"] }
tokio = { version = "1.50.0", features = ["time"] }
ts-rs = { version = "11.1.0", features = ["serde-compat"] }
