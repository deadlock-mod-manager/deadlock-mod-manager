packages:
  - apps/*
  - packages/*
  - tools/*

overrides:
  typescript: "catalog:"
  "@types/node": 22.19.15
  "@isaacs/brace-expansion": ">=5.0.1"
  fast-xml-parser: ">=5.5.9"
  h3: ">=1.15.10"
  keyv: ">=5.6.0"
  minimatch: ">=10.2.4"
  react: 19.2.0
  react-dom: 19.2.0
  rollup: ">=4.60.0"
  seroval: ">=1.5.1"
  tar: ">=7.5.13"
  "@langchain/community@<=1.1.17": ">=1.1.18"
  "@orpc/client@<=1.13.5": ">=1.13.6"
  ajv@>=7.0.0-alpha.0 <8.18.0: ">=8.18.0"
  diff@>=6.0.0 <8.0.3: ">=8.0.3"
  dompurify@>=3.1.3 <=3.3.1: ">=3.3.2"
  esbuild@<=0.24.2: ">=0.25.0"
  hono@<4.12.7: ">=4.12.7"
  langsmith@>=0.3.41 <0.4.6: ">=0.4.6"
  lodash-es@>=4.0.0 <=4.17.22: ">=4.17.23"
  lodash@>=4.0.0 <=4.17.22: ">=4.17.23"
  markdown-it@>=13.0.0 <14.1.1: ">=14.1.1"
  serialize-javascript@<=7.0.2: ">=7.0.3"
  svgo@=4.0.0: ">=4.0.1"
  undici@<6.23.0: ">=6.23.0"
  undici@>=7.0.0 <7.18.2: ">=7.18.2"
  vite@>=7.1.0 <=7.1.10: ">=7.1.11"
  rolldown: 1.0.1

allowBuilds:
  "@parcel/watcher": true
  "@sentry/cli": true
  "@swc/core": true
  "@tailwindcss/oxide": true
  bun: true
  core-js: true
  esbuild: true
  lefthook: true
  msgpackr-extract: true
  protobufjs: true
  puppeteer: true
  sharp: true
  better-sqlite3: false

autoInstallPeers: false
dedupePeerDependents: true
minimumReleaseAge: 10080
minimumReleaseAgeStrict: true
pmOnFail: ignore

peerDependencyRules:
  ignoreMissing:
    - "@browserbasehq/stagehand"
    - "@ibm-cloud/watsonx-ai"
    - "ibm-cloud-sdk-core"
  allowedVersions:
    "tailwindcss-animate>tailwindcss": "3"

catalog:
  vite: ^7.1.11
  "@isaacs/ttlcache": ^1.4.1
  "@keyv/redis": ^5.1.6
  "@sentry/node": ^10.46.0
  cache-manager: ^7.2.8
  cacheable: ^2.3.4
  keyv: ^5.6.0
  typescript: ^6.0.0
  "@typescript/native-preview": "npm:@typescript/native-preview@beta"
  zod: ^4.2.0
  better-auth: ^1.5.6
